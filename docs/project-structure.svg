<svg xmlns="http://www.w3.org/2000/svg" width="820" height="780" viewBox="0 0 820 780">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1b2e"/>
      <stop offset="100%" stop-color="#0f1019"/>
    </linearGradient>
    <linearGradient id="header" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#b8860b"/>
      <stop offset="100%" stop-color="#daa520"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="820" height="780" rx="12" fill="url(#bg)"/>

  <!-- Top border accent -->
  <rect width="820" height="3" rx="1.5" fill="url(#header)" opacity="0.8"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="820" height="40" rx="12" fill="#16172a"/>
  <rect x="0" y="20" width="820" height="20" fill="#16172a"/>
  <circle cx="20" cy="20" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="20" r="6" fill="#ffbd2e"/>
  <circle cx="60" cy="20" r="6" fill="#28ca41"/>
  <text x="410" y="25" font-family="monospace" font-size="13" fill="#8888aa" text-anchor="middle">📂 tloz-timeline</text>

  <!-- Content area -->
  <g transform="translate(30, 60)" font-family="'Cascadia Code', 'Fira Code', 'JetBrains Mono', monospace" font-size="14">

    <!-- Root level -->
    <text y="0" fill="#daa520" font-weight="bold" filter="url(#glow)">tloz-timeline/</text>

    <!-- public/ -->
    <text y="28" fill="#555570">├──</text>
    <text y="28" x="42" fill="#6ec6ff">public/</text>
    <text y="28" x="370" fill="#555570" font-size="12" font-style="italic">Imágenes PNG de cada era/juego (15 imágenes)</text>

    <!-- src/ -->
    <text y="56" fill="#555570">├──</text>
    <text y="56" x="42" fill="#6ec6ff" font-weight="bold">src/</text>

    <!-- assets/font/ -->
    <text y="84" fill="#555570">│   ├──</text>
    <text y="84" x="80" fill="#6ec6ff">assets/font/</text>
    <text y="84" x="370" fill="#555570" font-size="12" font-style="italic">Fuente personalizada HyliaSerif</text>

    <!-- components/ -->
    <text y="112" fill="#555570">│   ├──</text>
    <text y="112" x="80" fill="#6ec6ff">components/</text>

    <!-- Era/ -->
    <text y="140" fill="#555570">│   │   ├──</text>
    <text y="140" x="118" fill="#6ec6ff">Era/</text>
    <text y="140" x="370" fill="#555570" font-size="12" font-style="italic">Renderiza una era (evento/juego)</text>

    <!-- TimelinePath/ -->
    <text y="168" fill="#555570">│   │   ├──</text>
    <text y="168" x="118" fill="#6ec6ff">TimelinePath/</text>
    <text y="168" x="370" fill="#555570" font-size="12" font-style="italic">Líneas de conexión entre eras</text>

    <!-- TriangleCorner/ -->
    <text y="196" fill="#555570">│   │   └──</text>
    <text y="196" x="118" fill="#6ec6ff">TriangleCorner/</text>
    <text y="196" x="370" fill="#555570" font-size="12" font-style="italic">Esquinas decorativas estilo Zelda</text>

    <!-- constants/ -->
    <text y="224" fill="#555570">│   ├──</text>
    <text y="224" x="80" fill="#6ec6ff">constants/</text>

    <text y="252" fill="#555570">│   │   └──</text>
    <text y="252" x="118" fill="#c792ea">variables.ts</text>
    <text y="252" x="370" fill="#555570" font-size="12" font-style="italic">Dimensiones y duración de animaciones</text>

    <!-- data/ -->
    <text y="280" fill="#555570">│   ├──</text>
    <text y="280" x="80" fill="#6ec6ff">data/</text>

    <!-- eras/ -->
    <text y="308" fill="#555570">│   │   ├──</text>
    <text y="308" x="118" fill="#6ec6ff">eras/</text>
    <text y="308" x="370" fill="#555570" font-size="12" font-style="italic">Definición de eras por juego (1986–2000)</text>

    <text y="336" fill="#555570">│   │   │   ├──</text>
    <text y="336" x="156" fill="#c3e88d">1986-tloz.ts</text>
    <text y="336" x="370" fill="#555570" font-size="12" font-style="italic">The Legend of Zelda</text>

    <text y="364" fill="#555570">│   │   │   ├──</text>
    <text y="364" x="156" fill="#c3e88d">1987-ziitaol.ts</text>
    <text y="364" x="370" fill="#555570" font-size="12" font-style="italic">Zelda II: The Adventure of Link</text>

    <text y="392" fill="#555570">│   │   │   ├──</text>
    <text y="392" x="156" fill="#c3e88d">1991-tlozalttp.ts</text>
    <text y="392" x="370" fill="#555570" font-size="12" font-style="italic">A Link to the Past</text>

    <text y="420" fill="#555570">│   │   │   ├──</text>
    <text y="420" x="156" fill="#c3e88d">1993-tlozla.ts</text>
    <text y="420" x="370" fill="#555570" font-size="12" font-style="italic">Link's Awakening</text>

    <text y="448" fill="#555570">│   │   │   ├──</text>
    <text y="448" x="156" fill="#c3e88d">1998-tlozoot.ts</text>
    <text y="448" x="370" fill="#555570" font-size="12" font-style="italic">Ocarina of Time</text>

    <text y="476" fill="#555570">│   │   │   ├──</text>
    <text y="476" x="156" fill="#c3e88d">2000-tlozmm.ts</text>
    <text y="476" x="370" fill="#555570" font-size="12" font-style="italic">Majora's Mask</text>

    <text y="504" fill="#555570">│   │   │   └──</text>
    <text y="504" x="156" fill="#c792ea">index.ts</text>
    <text y="504" x="370" fill="#555570" font-size="12" font-style="italic">Re-exports de todas las eras</text>

    <text y="532" fill="#555570">│   │   ├──</text>
    <text y="532" x="118" fill="#c792ea">releases.ts</text>
    <text y="532" x="370" fill="#555570" font-size="12" font-style="italic">Secuencia de pasos e interfaces</text>

    <text y="560" fill="#555570">│   │   └──</text>
    <text y="560" x="118" fill="#89ddff">debug_releases.ts</text>
    <text y="560" x="370" fill="#555570" font-size="12" font-style="italic">Datos de prueba para desarrollo</text>

    <!-- hooks/ -->
    <text y="588" fill="#555570">│   ├──</text>
    <text y="588" x="80" fill="#6ec6ff">hooks/</text>

    <text y="616" fill="#555570">│   │   └──</text>
    <text y="616" x="118" fill="#c792ea">useStep.tsx</text>
    <text y="616" x="370" fill="#555570" font-size="12" font-style="italic">Hook de navegación entre pasos</text>

    <!-- panzoom/ -->
    <text y="644" fill="#555570">│   ├──</text>
    <text y="644" x="80" fill="#6ec6ff">panzoom/</text>
    <text y="644" x="370" fill="#555570" font-size="12" font-style="italic">Fork local de la librería panzoom</text>

    <!-- theme/ -->
    <text y="672" fill="#555570">│   ├──</text>
    <text y="672" x="80" fill="#6ec6ff">theme/</text> <text y="672" x="370" fill="#555570" font-size="12" font-style="italic">colors.scss — Variables de color</text>

    <!-- utils/ -->
    <text y="700" fill="#555570">│   └──</text>
    <text y="700" x="80" fill="#6ec6ff">utils/</text>
    <text y="700" x="370" fill="#555570" font-size="12" font-style="italic">centerWindow.ts, transformUtils.ts</text>

  </g>
</svg>
