<svg xmlns="http://www.w3.org/2000/svg" width="860" height="580" viewBox="0 0 860 580">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1b2e"/>
      <stop offset="100%" stop-color="#0f1019"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#b8860b"/>
      <stop offset="100%" stop-color="#daa520"/>
    </linearGradient>
    <linearGradient id="goldNode" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3d2e0a"/>
      <stop offset="100%" stop-color="#2a1f06"/>
    </linearGradient>
    <linearGradient id="blueNode" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a2a4a"/>
      <stop offset="100%" stop-color="#0f1a30"/>
    </linearGradient>
    <linearGradient id="purpleNode" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a1a3e"/>
      <stop offset="100%" stop-color="#1a0f28"/>
    </linearGradient>
    <linearGradient id="greenNode" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a3a2a"/>
      <stop offset="100%" stop-color="#0f2018"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="arrowGold" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#daa520" opacity="0.8"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6ec6ff" opacity="0.8"/>
    </marker>
    <marker id="arrowPurple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#c792ea" opacity="0.8"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="860" height="580" rx="12" fill="url(#bg)"/>
  <rect width="860" height="3" rx="1.5" fill="url(#gold)" opacity="0.8"/>

  <!-- ============ ARROWS (behind nodes) ============ -->

  <!-- Archivos de eras → releases.ts -->
  <line x1="430" y1="90" x2="430" y2="148" stroke="#daa520" stroke-width="2" opacity="0.6" marker-end="url(#arrowGold)"/>
  <rect x="335" y="100" width="190" height="32" rx="6" fill="#1a1b2e" opacity="0.9"/>
  <text x="430" y="120" font-family="'Segoe UI', sans-serif" font-size="11" fill="#daa520" text-anchor="middle">Proveen arrays de eras</text>

  <!-- releases.ts → App.tsx -->
  <line x1="430" y1="198" x2="430" y2="260" stroke="#daa520" stroke-width="2" opacity="0.6" marker-end="url(#arrowGold)"/>
  <rect x="315" y="210" width="230" height="32" rx="6" fill="#1a1b2e" opacity="0.9"/>
  <text x="430" y="230" font-family="'Segoe UI', sans-serif" font-size="11" fill="#daa520" text-anchor="middle">Define pasos, eras, animaciones</text>

  <!-- App.tsx → Era -->
  <line x1="355" y1="310" x2="130" y2="388" stroke="#6ec6ff" stroke-width="1.5" opacity="0.5" marker-end="url(#arrowBlue)"/>
  <rect x="165" y="338" width="120" height="24" rx="6" fill="#1a1b2e" opacity="0.9"/>
  <text x="225" y="354" font-family="'Segoe UI', sans-serif" font-size="11" fill="#6ec6ff" text-anchor="middle">Renderiza eras</text>

  <!-- App.tsx → TimelinePath -->
  <line x1="400" y1="310" x2="310" y2="388" stroke="#6ec6ff" stroke-width="1.5" opacity="0.5" marker-end="url(#arrowBlue)"/>
  <rect x="280" y="338" width="150" height="24" rx="6" fill="#1a1b2e" opacity="0.9"/>
  <text x="355" y="354" font-family="'Segoe UI', sans-serif" font-size="11" fill="#6ec6ff" text-anchor="middle">Renderiza conexiones</text>

  <!-- App.tsx → useStep -->
  <line x1="460" y1="310" x2="520" y2="388" stroke="#c792ea" stroke-width="1.5" opacity="0.5" marker-end="url(#arrowPurple)"/>
  <rect x="435" y="338" width="140" height="24" rx="6" fill="#1a1b2e" opacity="0.9"/>
  <text x="505" y="354" font-family="'Segoe UI', sans-serif" font-size="11" fill="#c792ea" text-anchor="middle">Navega entre pasos</text>

  <!-- App.tsx → panzoom -->
  <line x1="490" y1="310" x2="660" y2="388" stroke="#c792ea" stroke-width="1.5" opacity="0.5" marker-end="url(#arrowPurple)"/>
  <rect x="530" y="338" width="150" height="24" rx="6" fill="#1a1b2e" opacity="0.9"/>
  <text x="605" y="354" font-family="'Segoe UI', sans-serif" font-size="11" fill="#c792ea" text-anchor="middle">Pan/Zoom del canvas</text>

  <!-- App.tsx → centerWindow -->
  <line x1="505" y1="310" x2="775" y2="388" stroke="#c792ea" stroke-width="1.5" opacity="0.5" marker-end="url(#arrowPurple)"/>
  <rect x="620" y="338" width="130" height="24" rx="6" fill="#1a1b2e" opacity="0.9"/>
  <text x="685" y="354" font-family="'Segoe UI', sans-serif" font-size="11" fill="#c792ea" text-anchor="middle">Centra la vista</text>

  <!-- Era → TriangleCorner -->
  <line x1="130" y1="430" x2="130" y2="490" stroke="#6ec6ff" stroke-width="1.5" opacity="0.5" marker-end="url(#arrowBlue)"/>
  <rect x="40" y="448" width="180" height="24" rx="6" fill="#1a1b2e" opacity="0.9"/>
  <text x="130" y="464" font-family="'Segoe UI', sans-serif" font-size="11" fill="#6ec6ff" text-anchor="middle">Usa esquinas decorativas</text>

  <!-- ============ NODES ============ -->

  <!-- Node: Archivos de eras -->
  <rect x="310" y="40" width="240" height="50" rx="10" fill="url(#greenNode)" stroke="#4ec9b0" stroke-width="1.5"/>
  <text x="430" y="63" font-family="'Segoe UI', sans-serif" font-size="14" fill="#c3e88d" text-anchor="middle" font-weight="bold">Archivos de eras</text>
  <text x="430" y="80" font-family="'Segoe UI', sans-serif" font-size="11" fill="#7ab87a" text-anchor="middle">(1986 – 2000)</text>

  <!-- Node: releases.ts -->
  <rect x="340" y="150" width="180" height="48" rx="10" fill="url(#goldNode)" stroke="#daa520" stroke-width="1.5"/>
  <text x="430" y="180" font-family="'Cascadia Code', monospace" font-size="14" fill="#daa520" text-anchor="middle" filter="url(#glow)">releases.ts</text>

  <!-- Node: App.tsx (main, larger) -->
  <rect x="350" y="264" width="160" height="48" rx="12" fill="url(#goldNode)" stroke="#daa520" stroke-width="2.5"/>
  <text x="430" y="294" font-family="'Cascadia Code', monospace" font-size="16" fill="#ffd700" text-anchor="middle" font-weight="bold" filter="url(#glow)">App.tsx</text>

  <!-- Node: Era -->
  <rect x="55" y="390" width="150" height="42" rx="10" fill="url(#blueNode)" stroke="#6ec6ff" stroke-width="1.5"/>
  <text x="130" y="416" font-family="'Cascadia Code', monospace" font-size="13" fill="#6ec6ff" text-anchor="middle">Era</text>

  <!-- Node: TimelinePath -->
  <rect x="240" y="390" width="150" height="42" rx="10" fill="url(#blueNode)" stroke="#6ec6ff" stroke-width="1.5"/>
  <text x="315" y="416" font-family="'Cascadia Code', monospace" font-size="13" fill="#6ec6ff" text-anchor="middle">TimelinePath</text>

  <!-- Node: useStep -->
  <rect x="440" y="390" width="150" height="42" rx="10" fill="url(#purpleNode)" stroke="#c792ea" stroke-width="1.5"/>
  <text x="515" y="416" font-family="'Cascadia Code', monospace" font-size="13" fill="#c792ea" text-anchor="middle">useStep</text>

  <!-- Node: panzoom -->
  <rect x="610" y="390" width="120" height="42" rx="10" fill="url(#purpleNode)" stroke="#c792ea" stroke-width="1.5"/>
  <text x="670" y="416" font-family="'Cascadia Code', monospace" font-size="13" fill="#c792ea" text-anchor="middle">panzoom</text>

  <!-- Node: centerWindow -->
  <rect x="740" y="390" width="100" height="42" rx="10" fill="url(#purpleNode)" stroke="#c792ea" stroke-width="1.5"/>
  <text x="790" y="410" font-family="'Cascadia Code', monospace" font-size="11" fill="#c792ea" text-anchor="middle">center</text>
  <text x="790" y="425" font-family="'Cascadia Code', monospace" font-size="11" fill="#c792ea" text-anchor="middle">Window</text>

  <!-- Node: TriangleCorner -->
  <rect x="40" y="494" width="180" height="42" rx="10" fill="url(#blueNode)" stroke="#6ec6ff" stroke-width="1.5"/>
  <text x="130" y="520" font-family="'Cascadia Code', monospace" font-size="13" fill="#6ec6ff" text-anchor="middle">TriangleCorner</text>

  <!-- Legend -->
  <g transform="translate(600, 500)">
    <rect x="0" y="0" width="220" height="68" rx="8" fill="#16172a" stroke="#333355" stroke-width="1"/>
    <circle cx="18" cy="18" r="5" fill="#daa520"/>
    <text x="32" y="22" font-family="'Segoe UI', sans-serif" font-size="11" fill="#888899">Datos / core</text>
    <circle cx="18" cy="38" r="5" fill="#6ec6ff"/>
    <text x="32" y="42" font-family="'Segoe UI', sans-serif" font-size="11" fill="#888899">Componentes UI</text>
    <circle cx="18" cy="58" r="5" fill="#c792ea"/>
    <text x="32" y="62" font-family="'Segoe UI', sans-serif" font-size="11" fill="#888899">Hooks / Utilidades</text>
  </g>
</svg>
